<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Viewset Visualizer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <h1>Viewsets</h1>
        <label>
          Preset
          <select id="viewsetSelect"></select>
        </label>
        <div class="panoControls">
          <button id="prevPano" type="button">Previous pano</button>
          <button id="nextPano" type="button">Next pano</button>
          <div id="panoLabel" class="panoLabel"></div>
        </div>
        <div id="summary" class="summary"></div>
        <div class="controls">
          <button id="showAll" type="button">Show all</button>
          <button id="hideAll" type="button">Hide all</button>
        </div>
        <div id="viewMatrix" class="viewMatrix"></div>
        <div id="selectedView" class="selectedView"></div>
      </aside>
      <section class="stage">
        <div class="canvasWrap">
          <canvas id="canvas"></canvas>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
