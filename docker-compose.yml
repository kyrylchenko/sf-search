x-main-service: &main-service
  build:
    context: .
    dockerfile: services/main/Dockerfile
  env_file:
    - path: services/main/.env
      required: false
  environment:
    DB_USER: ${POSTGRES_USER:-sf_search}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-sf_search_dev_password}
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: ${POSTGRES_DB:-sf_search}
    DB_DRIVER: postgresql+psycopg
    NATS_URL: nats://nats:4222
    OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
    OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
    OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
    OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-local}
    DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
  volumes:
    - ./services/main/.local:/app/services/main/.local
    - ./services/main/target.geojson:/app/services/main/target.geojson:ro
    - ./docs:/app/docs:ro
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sf_search}
      POSTGRES_USER: ${POSTGRES_USER:-sf_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sf_search_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222", "--store_dir", "/data/jetstream"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery:
    <<: *main-service
    command: ["uv", "run", "python", "-m", "main_service.discovery"]
    profiles: ["pipeline"]
    restart: unless-stopped

  downloader:
    <<: *main-service
    command: ["uv", "run", "python", "-m", "main_service.downloader"]
    profiles: ["pipeline"]
    restart: unless-stopped

  processing:
    <<: *main-service
    command: ["uv", "run", "python", "-m", "main_service.processing"]
    profiles: ["pipeline"]
    restart: unless-stopped

  embedding:
    <<: *main-service
    command: ["uv", "run", "python", "-m", "main_service.embedding"]
    profiles: ["pipeline"]
    restart: unless-stopped

  monitoring:
    <<: *main-service
    command: ["uv", "run", "python", "-m", "main_service.monitoring"]
    profiles: ["pipeline"]
    restart: unless-stopped

  query-ui:
    <<: *main-service
    command: ["uv", "run", "python", "-m", "main_service.embedding.query_ui", "--host", "0.0.0.0"]
    ports:
      - "${QUERY_UI_PORT:-8787}:8787"
    profiles: ["query"]
    restart: unless-stopped

volumes:
  nats-data:
